<svg width="600" height="400" viewBox="0 0 600 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="heroGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#8B5CF6;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:0.4" />
    </linearGradient>
    <linearGradient id="heroGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:0.6" />
    </linearGradient>
    <linearGradient id="heroGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F59E0B;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#EF4444;stop-opacity:0.6" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background Elements -->
  <circle cx="100" cy="80" r="60" fill="url(#heroGradient1)" opacity="0.3"/>
  <circle cx="500" cy="120" r="80" fill="url(#heroGradient2)" opacity="0.2"/>
  <circle cx="300" cy="320" r="100" fill="url(#heroGradient3)" opacity="0.15"/>
  
  <!-- Main Medical Cross -->
  <g transform="translate(250, 150)">
    <rect x="-15" y="-40" width="30" height="80" fill="white" rx="5" filter="url(#glow)"/>
    <rect x="-40" y="-15" width="80" height="30" fill="white" rx="5" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="8" fill="#3B82F6"/>
  </g>
  
  <!-- AI/Technology Elements -->
  <g transform="translate(150, 100)">
    <rect x="0" y="0" width="20" height="20" fill="white" opacity="0.8" transform="rotate(45 10 10)"/>
    <rect x="15" y="15" width="15" height="15" fill="white" opacity="0.6" transform="rotate(45 22.5 22.5)"/>
    <rect x="30" y="30" width="10" height="10" fill="white" opacity="0.4" transform="rotate(45 35 35)"/>
  </g>
  
  <!-- Heart Symbol -->
  <g transform="translate(400, 120)">
    <path d="M0 10 C0 0, 15 0, 15 10 C15 0, 30 0, 30 10 C30 20, 15 30, 15 30 C15 30, 0 20, 0 10 Z" 
          fill="white" opacity="0.9" filter="url(#glow)"/>
  </g>
  
  <!-- Stethoscope -->
  <g transform="translate(100, 250)">
    <circle cx="0" cy="0" r="12" fill="none" stroke="white" stroke-width="4" opacity="0.8"/>
    <path d="M12 0 Q25 10, 45 0" stroke="white" stroke-width="4" fill="none" opacity="0.8"/>
    <circle cx="45" cy="0" r="8" fill="none" stroke="white" stroke-width="4" opacity="0.8"/>
  </g>
  
  <!-- DNA/Genetic Elements -->
  <g transform="translate(450, 200)">
    <path d="M0 0 Q10 -10, 20 0 Q30 10, 40 0 Q50 -10, 60 0" 
          stroke="white" stroke-width="3" fill="none" opacity="0.7"/>
    <circle cx="0" cy="0" r="3" fill="white" opacity="0.8"/>
    <circle cx="20" cy="0" r="3" fill="white" opacity="0.8"/>
    <circle cx="40" cy="0" r="3" fill="white" opacity="0.8"/>
    <circle cx="60" cy="0" r="3" fill="white" opacity="0.8"/>
  </g>
  
  <!-- Floating Particles -->
  <circle cx="80" cy="60" r="3" fill="white" opacity="0.6"/>
  <circle cx="520" cy="80" r="2" fill="white" opacity="0.5"/>
  <circle cx="150" cy="350" r="4" fill="white" opacity="0.4"/>
  <circle cx="480" cy="300" r="2" fill="white" opacity="0.6"/>
  <circle cx="200" cy="180" r="3" fill="white" opacity="0.5"/>
  <circle cx="400" cy="250" r="2" fill="white" opacity="0.4"/>
  
  <!-- Decorative Lines -->
  <path d="M50 200 Q300 150, 550 200" stroke="white" stroke-width="2" fill="none" opacity="0.3"/>
  <path d="M50 250 Q300 220, 550 250" stroke="white" stroke-width="1" fill="none" opacity="0.2"/>
</svg>
