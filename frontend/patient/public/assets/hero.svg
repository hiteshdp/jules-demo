<svg width="400" height="300" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#gradient1)" opacity="0.1"/>
  
  <!-- Hair/Skin Health Icons -->
  <circle cx="100" cy="80" r="30" fill="url(#gradient1)" opacity="0.8"/>
  <circle cx="300" cy="120" r="25" fill="url(#gradient2)" opacity="0.8"/>
  <circle cx="200" cy="200" r="35" fill="url(#gradient1)" opacity="0.6"/>
  
  <!-- Medical Cross -->
  <rect x="95" y="70" width="10" height="20" fill="white"/>
  <rect x="90" y="75" width="20" height="10" fill="white"/>
  
  <!-- Heart -->
  <path d="M290 110 C290 100, 300 100, 300 110 C300 100, 310 100, 310 110 C310 120, 300 130, 300 130 C300 130, 290 120, 290 110 Z" fill="white"/>
  
  <!-- Stethoscope -->
  <circle cx="200" cy="190" r="8" fill="none" stroke="white" stroke-width="3"/>
  <path d="M208 190 Q220 200, 240 190" stroke="white" stroke-width="3" fill="none"/>
  <circle cx="240" cy="190" r="6" fill="none" stroke="white" stroke-width="3"/>
  
  <!-- AI/Technology Elements -->
  <rect x="50" y="50" width="20" height="20" fill="white" opacity="0.7" transform="rotate(45 60 60)"/>
  <rect x="330" y="60" width="15" height="15" fill="white" opacity="0.7" transform="rotate(45 337.5 67.5)"/>
  <rect x="80" y="220" width="12" height="12" fill="white" opacity="0.7" transform="rotate(45 86 226)"/>
  
  <!-- Decorative Lines -->
  <path d="M50 150 Q200 100, 350 150" stroke="white" stroke-width="2" fill="none" opacity="0.5"/>
  <path d="M50 200 Q200 180, 350 200" stroke="white" stroke-width="2" fill="none" opacity="0.3"/>
</svg>
